# Round 3 of the sentry acceptance bench: BLUE SENTRY at the outpost-lob point
# vs a SPINNING RED HERO target at the base-lob spot in the OPPOSING (blue)
# half — GMapInfo.DeploymentBlue (-5.20, 8.50)m, the exact point the match
# strategy drives a ranging hero to (AIMoveMode=6 destination; NOT generic
# Marker_40), i.e. where an attacking red hero stands to lob the blue base.
# Hero MUST be tn=1 or the skin falls back to the logo texture and yolo
# misclassifies. 100-round budget.
#
#   build\Release\gestalt.exe <ws-port> configs\gestalt_sentry_base_hero.yaml

enemy_color: "red"

#####----- bench scenario -----#####
bench_shooter_entity: "66000012"
bench_shooter_class: 1004
bench_allowance: 100
bench_target: "vehicle"
bench_target_pid: 92013
bench_target_spawn: "RBNavLab spawn entity=hero team=0 tn=1 pid=92013"
bench_target_drive: "RBNavLab goto 92013 -520 850"
bench_target_goal_cm: [-520, 850]                # DeploymentBlue base-lob point
bench_target_goal_radius_cm: 350                 # hero AutoPath stop band ~3m (match deploy gate: 450)
bench_target_spin:  "RBNavLab mode 92013 99 0"
bench_target_park_cm: [450, -50]                 # teardown: drive clear of later rounds
bench_target_hp: 5000
bench_damage_per_hit: 24                         # 17mm vs vehicle armor (infantry-calibrated; check histogram)
bench_boot_pitch: 0

#####----- detector / yolo -----#####
yolo_name: yolo11
yolo11_model_path: assets/yolo11.xml
classify_model: assets/tiny_resnet.onnx
device: CPU
min_confidence: 0.4
# (sim_one_as_big retired 2026-07-13: armor_properties now maps one->big at the
# source — the upstream table erroneously declared hero armor small, which
# check_type then erased unconditionally.)
roi: { x: 320, y: 26, width: 640, height: 640 }
use_roi: true

# traditional-detector keys — required by construction, inert on the yolo path:
threshold: 150
max_angle_error: 45
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25

#####----- tracker -----#####
min_detect_count: 3
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75
max_frame_gap: 0.20

#####----- aimer -----#####
yaw_offset: 0
pitch_offset: 0
comming_angle: 60
leaving_angle: 20
decision_speed: 8
high_speed_delay_time: 0.20
low_speed_delay_time: 0.20

#####----- shooter -----#####
first_tolerance: 3
second_tolerance: 2
judge_distance: 2
auto_fire: true

#####----- geometry (OpenCV cam → UE world) -----#####
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]
R_camera2gimbal:  [0, 0, 1, -1, 0, 0, 0, -1, 0]
t_camera2gimbal:  [0, 0, 0]

#####----- camera intrinsics (ideal UE pinhole, FOV_h=25 @ 1280x720) -----#####
camera_matrix: [2886.9, 0, 640.0, 0, 2886.9, 360.0, 0, 0, 1]
distort_coeffs: [0, 0, 0, 0, 0]
sim_quad_scale: 1.192
z_adapter: false
v_adapter: true
camera_json: '{"enabled":1,"fovDegrees":25,"shutterSpeed":120,"iso":600}'
