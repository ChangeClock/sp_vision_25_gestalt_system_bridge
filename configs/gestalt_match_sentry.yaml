# LIVE-MATCH sentry takeover: sp_vision spawns a RED SENTRY in the prep stage,
# claims its turret + fire, arms the camera/bridge, and only then STARTS the
# match — externally owned from second zero. Chassis navigation and economy
# stay with the built-in AI. Launch the game held in prep (-SkipMatchStart):
#
#   powershell -File scripts/ai-match-selftest.ps1 -SkipMatchStart 1 `
#       -MatchObserveSeconds 900 -MapId 4 -ResX 1280 -ResY 720
#   .\build\Release\gestalt.exe <ws-port> configs\gestalt_match_sentry.yaml --timeout=600
#
# The bridge constructs/compiles and infer-warms the detector + solver before
# touching match state, then claims pid 0 via ExtAimClaim (atomic old-mode save + mode90).
# A dedicated thread renews the lease every second while that pawn is alive, so
# inference/model/capture waits cannot outrun the five-second game-side lease.
# views through its first-person gun (RBTakeOver 0 — a roster pawn's camera
# comes up in TPS and breaks the fov-25 intrinsics), and adds an idle scan:
# after 2s without a fire solution the turret spins yaw at 60°/s while pitch
# rides a ±15° triangle wave (spiral coverage — low targets under the muzzle
# line are invisible to a level-only sweep), freezing both axes while raw
# detections are present so the tracker can lock; the freeze target is the
# current telemetry pose, never the previous scan target. On death, heartbeat
# renewal stops, an explicit release is sent, and revival remains the game's
# own business. The bridge only shows live revive progress and re-asserts claim
# + gun view after HP returns on the same map (in-place revive) or a newer map,
# then repeats identity + physical-ready + mode/frame/FOV/armLength/RBExtAim
# effect gates. WS or
# capture recovery likewise requires claim + takeover + camera + the full gate;
# otherwise the run fails safely. Pixel capture is pinned to the process that
# owns the requested WS listener port, so another UE publisher cannot be mixed
# into this control session. Exit on match end / timeout.

enemy_color: "blue"                # red sentry shoots BLUE targets

#####----- bench scenario -----#####
bench_match: true
bench_shooter_entity: "66000005"   # SentryRobotEntity — HACHISEN (SKM_Sentry) chassis
bench_shooter_class: 1004          # sentry class id (career-based, same both teams)
bench_shooter_team: 0              # 0 = red, 1 = blue
bench_allowance: 400               # starting 17mm grant; resupply is the AI's business

#####----- detector / yolo -----#####
yolo_name: yolo11
yolo11_model_path: assets/yolo11.xml
classify_model: assets/tiny_resnet.onnx
device: CPU
min_confidence: 0.4
roi: { x: 320, y: 26, width: 640, height: 640 }
use_roi: true

# traditional-detector keys — required by construction, inert on the yolo path:
threshold: 150
max_angle_error: 45
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25

#####----- tracker -----#####
min_detect_count: 3
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75
max_frame_gap: 0.20

#####----- aimer -----#####
yaw_offset: 0
pitch_offset: 0
comming_angle: 60
leaving_angle: 20
decision_speed: 8
high_speed_delay_time: 0.20
low_speed_delay_time: 0.20

#####----- shooter -----#####
first_tolerance: 3
second_tolerance: 2
judge_distance: 2
auto_fire: true

#####----- geometry (OpenCV cam → UE world) -----#####
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]
R_camera2gimbal:  [0, 0, 1, -1, 0, 0, 0, -1, 0]
t_camera2gimbal:  [0, 0, 0]

#####----- camera intrinsics (ideal UE pinhole, FOV_h=25 @ 1280x720) -----#####
frame_width: 1280
frame_height: 720
camera_matrix: [2886.9, 0, 640.0, 0, 2886.9, 360.0, 0, 0, 1]
distort_coeffs: [0, 0, 0, 0, 0]
sim_quad_scale: 1.192
z_adapter: false
v_adapter: true
# armLength:0 retracts the sentry chassis "Tower" camera boom (400cm chase arm
# in Camera.csv → third-person view + broken gun-socket extrinsics) back to a
# true first-person mount. Requires the matching game-side applySettings key.
camera_json: '{"enabled":1,"fovDegrees":25,"shutterSpeed":120,"iso":600,"armLength":0}'
