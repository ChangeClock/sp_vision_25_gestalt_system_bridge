# Round 1 of the sentry acceptance bench: BLUE SENTRY (66000012) parked at the
# Blue outpost-lob point (AIMoveMode=5, ~5.9m) vs the natively SPINNING red
# outpost, exactly 100 rounds (allowance budget). Same vision stack as
# gestalt_far.yaml (the 95%-static baseline config).
#
#   build\Release\gestalt.exe <ws-port> configs\gestalt_sentry_outpost.yaml

enemy_color: "red"

#####----- bench scenario -----#####
bench_shooter_entity: "66000012"   # sentry chassis
bench_shooter_class: 1004          # blue sentry class id (Mario bench: 1003)
bench_allowance: 100               # 100-round acceptance budget
bench_target: "outpost"            # native ±144°/s drum, no spawn needed
bench_damage_per_hit: 20           # outpost armor: 20 HP per damaging 17mm hit
bench_boot_pitch: 10               # drum plates sit high at the lob standoff

#####----- detector / yolo -----#####
yolo_name: yolo11
yolo11_model_path: assets/yolo11.xml
classify_model: assets/tiny_resnet.onnx
device: CPU
min_confidence: 0.4
roi: { x: 320, y: 26, width: 640, height: 640 }
use_roi: true

# traditional-detector keys — required by construction, inert on the yolo path:
threshold: 150
max_angle_error: 45
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25

#####----- tracker -----#####
min_detect_count: 3
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75
max_frame_gap: 0.20

#####----- aimer -----#####
yaw_offset: 0
pitch_offset: 0
comming_angle: 60
leaving_angle: 20
decision_speed: 8
high_speed_delay_time: 0.20
low_speed_delay_time: 0.20

#####----- shooter -----#####
first_tolerance: 3
second_tolerance: 2
judge_distance: 2
auto_fire: true

#####----- geometry (OpenCV cam → UE world) -----#####
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]
R_camera2gimbal:  [0, 0, 1, -1, 0, 0, 0, -1, 0]
t_camera2gimbal:  [0, 0, 0]

#####----- camera intrinsics (ideal UE pinhole, FOV_h=25 @ 1280x720) -----#####
camera_matrix: [2886.9, 0, 640.0, 0, 2886.9, 360.0, 0, 0, 1]
distort_coeffs: [0, 0, 0, 0, 0]
sim_quad_scale: 1.192
z_adapter: false
camera_json: '{"enabled":1,"fovDegrees":25,"shutterSpeed":120,"iso":600}'
